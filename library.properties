sentence=Encode decimal, hex, or binary values as LED blink patterns — no serial port needed.
paragraph=Pisco Code extends the classic blink-count method with a framing signal, enabling unambiguous representation of any digit (including zero) in any position. Supports negative values, configurable digit count, software/hardware PWM controllers, and any actuator (LED, vibration motor). Runs on AVR, STM32, and any C++17 platform.
